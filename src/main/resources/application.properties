spring.application.name=AITP
spring.main.lazy-initialization=false

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/aitp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Spring Batch - auto-create metadata tables
spring.batch.jdbc.initialize-schema=always

# OSM import — set to true only when you want to (re)import the PBF file
spring.batch.job.enabled=false
osm.import.file-path=file:data/turkey-tourist.osm.pbf
# Wikipedia enrichment — scheduled batch job with rate limiting
wikipedia.enrichment.enabled=true
wikipedia.enrichment.fixed-delay-ms=10000
wikipedia.enrichment.min-interval-ms=100
wikipedia.enrichment.max-items-per-run=100
wikipedia.enrichment.chunk-size=10
wikipedia.enrichment.parallelism=20
